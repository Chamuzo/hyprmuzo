[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = true
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900
cache_dir  = ""
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]
play = [
  { run = 'mpv "$@"', desc = "mpv", for = "unix" },
]
view = [
  { run = 'nvim "$@"', desc = "view in nvim", block = true, for = "unix" },
]

[open]
rules = [
  { name = "*/", use = "edit" },
  { mime = "text/*",        use = "edit" },
  { mime = "image/*",        use = "open" },
  { mime = "video/*",        use = "play" },
  { mime = "audio/*",        use = "play" },
  { mime = "application/json", use = "edit" },
  { mime = "application/x-shellscript", use = "edit" },
  { mime = "*",              use = "open" },
]
