# matugen — generate colors from wallpaper, render templates into app dirs

[config]
reload_apps = false
set_wallpaper = false

[templates.hyprland]
input_path = "~/.config/matugen/templates/colors-hypr.conf"
output_path = "~/.config/hypr/colors.conf"

[templates.waybar]
input_path = "~/.config/matugen/templates/colors-waybar.css"
output_path = "~/.config/waybar/colors.css"

[templates.kitty]
input_path = "~/.config/matugen/templates/colors-kitty.conf"
output_path = "~/.config/kitty/colors.conf"

[templates.rofi]
input_path = "~/.config/matugen/templates/colors-rofi.rasi"
output_path = "~/.config/rofi/colors.rasi"

[templates.swaync]
input_path = "~/.config/matugen/templates/colors-swaync.css"
output_path = "~/.config/swaync/colors.css"

[templates.gtk3]
input_path = "~/.config/matugen/templates/colors-gtk.css"
output_path = "~/.config/gtk-3.0/colors.css"

[templates.gtk4]
input_path = "~/.config/matugen/templates/colors-gtk.css"
output_path = "~/.config/gtk-4.0/colors.css"
