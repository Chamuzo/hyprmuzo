# hyprmuzo — minimal HyDE-style hyprland.conf
source = ~/.config/hypr/colors.conf

monitor=,preferred,auto,1

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GTK_THEME,adw-gtk3-dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
# uncomment if cursor flickers:
# cursor { no_hardware_cursors = true }

env = EDITOR,nvim
env = VISUAL,nvim
env = TERMINAL,kitty
env = BROWSER,brave

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swww-daemon
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = ~/.local/bin/themeswitch

input {
    kb_layout = us,latam
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $accent
    col.inactive_border = $surface
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease
    animation = border, 1, 6, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 5, ease
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

$mod = SUPER

# default apps — change here, all binds follow
$terminal    = kitty
$filemanager = kitty -e yazi
$browser     = brave
$editor      = kitty -e nvim
$ide         = vscodium
$launcher    = rofi -show drun
$locker      = hyprlock

bind = $mod, Q, exec, $terminal
bind = $mod, Escape, killactive
bind = $mod SHIFT, Escape, exit
bind = $mod, E, exec, $filemanager
bind = $mod, B, exec, $browser
bind = $mod, N, exec, $editor
bind = $mod, I, exec, $ide
bind = $mod, V, togglefloating
bind = $mod, R, exec, $launcher
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, L, exec, $locker
bind = $mod, T, exec, ~/.local/bin/themeswitch
bind = $mod SHIFT, T, exec, ~/.local/bin/themeswitch "$(find ~/Pictures/walls -type f | rofi -dmenu -p wall)"
bind = , Print, exec, hyprshot -m region
bind = $mod, Print, exec, hyprshot -m output
bind = $mod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
