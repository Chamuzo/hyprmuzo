source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    outer_color = $accent
    inner_color = $surface
    font_color = $on_surface
    fade_on_empty = true
    placeholder_text = <i>password</i>
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = $on_surface
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $on_surface
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}
